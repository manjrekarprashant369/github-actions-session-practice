# This is name of the workflow that will be displayed in the Action Tab
name: CICD

# Manual click (deliver) workflow whenever user needs
on:
  workflow_dispatch:
    inputs:
      environment:
        description: This is the environment value where this workflow runs
        default: dev
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging
          
jobs:
  # Every job needs separate runner, it’s called parallelism
  code:
    runs-on: ubuntu-latest    
    steps:
      - name: checkout code
        run: echo "Code clone from GitHub"
  
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build docker container
        run: echo "Docker container build"
  
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Testing the container"
  
  deploy:
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo "Docker compose deployed the app"
  
